<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신승민 포트폴리오 | 관리자 로그인</title>
  <meta name="description" content="신승민 개인 포트폴리오 관리자 로그인 페이지입니다.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation Header -->
  <header>
    <div class="nav-container">
      <div class="logo">
        <a href="index.html">SEUNGMIN SHIN</a>
      </div>
      <nav>
        <ul class="nav-menu">
          <li><a href="index.html">홈</a></li>
          <li><a href="profile.html">인적사항</a></li>
          <li><a href="activities.html">활동사항</a></li>
          <li><a href="skills.html">자격사항</a></li>
        </ul>
      </nav>
      <button id="themeToggle" class="theme-toggle-btn" title="테마 변경" aria-label="테마 변경">
        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
      <a href="admin.html" class="admin-login-btn" title="관리자 모드 로그인" aria-label="관리자 로그인">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </a>
      <button class="menu-toggle" aria-label="메뉴 열기">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main>
    <div class="login-card-container">
      <div class="glass-card login-card">
        <h2 class="login-title">Admin Login</h2>
        <form id="loginForm">
          <div class="form-group">
            <label for="username">관리자 아이디</label>
            <input type="text" id="username" class="form-input" placeholder="아이디를 입력하세요" required autocomplete="username">
          </div>
          
          <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" class="form-input" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
          </div>
          
          <button type="submit" class="btn btn-primary login-btn">로그인</button>
        </form>
        
        <div id="loginFeedback" style="margin-top: 1rem; font-size: 0.95rem; display: none;"></div>
        
        <a href="index.html" class="back-to-home">← 홈으로 돌아가기</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Shin Seung Min. All Rights Reserved. | Designed with Antigravity</p>
  </footer>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginForm = document.getElementById('loginForm');
      const feedback = document.getElementById('loginFeedback');
      
      if (loginForm) {
        loginForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const usernameVal = document.getElementById('username').value.trim();
          const passwordVal = document.getElementById('password').value.trim();
          
          feedback.style.display = 'block';
          
          // 간단한 모의 관리자 로그인 로직 (ID: admin / PW: admin)
          if (usernameVal === 'admin' && passwordVal === 'admin') {
            feedback.style.color = '#10b981';
            feedback.innerHTML = '✨ 로그인 성공! 관리자 세션을 시작합니다.';
            
            setTimeout(() => {
              alert('관리자 모드로 성공적으로 로그인되었습니다.');
              window.location.href = 'index.html';
            }, 1000);
          } else {
            feedback.style.color = '#ef4444';
            feedback.innerHTML = '❌ 아이디 또는 비밀번호가 올바르지 않습니다. (테스트용: admin/admin)';
          }
        });
      }
    });
  </script>
</body>
</html>
